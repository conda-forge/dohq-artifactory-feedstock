schema_version: 1

context:
  name: dohq-artifactory
  version: "1.0.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: c34adaf6faede3178e5355ce6a40ae92f03a126e2b2baa122f0b60285aeee51b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - setuptools
    - pip
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }},<3.13
    - pyjwt >=2.0,<3.0
    - python-dateutil
    - requests >=2.30.0

tests:
  - python:
      imports:
        - dohq_artifactory
      pip_check: true
      python_version: ${{ python_min }}
  - script: |
      # first download the tarball since pypi archive does not contain tests
      # but it does have the right version so we cannot only use the GitHub source
      curl -sL https://github.com/devopshq/artifactory/archive/refs/tags/${{ version }}.tar.gz | tar xz
      python -m pytest artifactory-${{ version }}/tests -munit
    requirements:
      run:
        - pytest >=7.0.0
        - responses >=0.23.1

about:
  summary: A Python interface to Artifactory
  license: MIT
  license_file: LICENSE
  homepage: https://devopshq.github.io/artifactory/

extra:
  recipe-maintainers:
    - ewu63
    - ThomasGandilhon
