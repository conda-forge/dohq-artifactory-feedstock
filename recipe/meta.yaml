{% set name = "dohq-artifactory" %}
{% set version = "0.9.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dohq-artifactory-{{ version }}.tar.gz
  sha256: 0494ec531f0b1a5c35e709a377e9568fd653486a7ca63e5aa7abcba7a7fba5dd

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - setuptools
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }},<3.12
    - pyjwt ~=2.0
    - python-dateutil
    - requests

test:
  imports:
    - dohq_artifactory
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://devopshq.github.io/artifactory/
  summary: A Python interface to Artifactory
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ewu63
    - ThomasGandilhon
